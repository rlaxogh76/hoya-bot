<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Card</title>
  </head>
  <body>
    <style>
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f6f8fa;
        --color-border-primary: #d0d7de;
        --color-text-primary: #1f2328;
        --color-text-secondary: #656d76;
        --font-sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #0d1117;
          --color-background-secondary: #161b22;
          --color-border-primary: #30363d;
          --color-text-primary: #e6edf3;
          --color-text-secondary: #8b949e;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .card {
        background: var(--color-background-primary);
        border: 1.5px solid var(--color-border-primary);
        border-radius: 20px;
        padding: 40px;
        display: inline-flex;
        gap: 36px;
        font-family: var(--font-sans);
      }
      .left {
        width: 300px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 1.5px solid var(--color-border-primary);
        overflow: hidden;
        margin-bottom: 18px;
        background: var(--color-background-secondary);
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .name {
        font-size: 24px;
        font-weight: 500;
        color: var(--color-text-primary);
        margin-bottom: 6px;
      }
      .handle {
        font-size: 16px;
        color: var(--color-text-secondary);
        margin-bottom: 22px;
      }
      .divider {
        width: 100%;
        border: none;
        border-top: 1.5px solid var(--color-border-primary);
        margin: 6px 0 18px;
      }
      .meta {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .meta-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 16px;
      }
      .meta-row .label {
        flex: 1;
        color: var(--color-text-secondary);
      }
      .meta-row .val {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .meta-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        opacity: 0.6;
      }
      .follow-row {
        display: flex;
        gap: 12px;
        width: 100%;
      }
      .follow-box {
        flex: 1;
        background: var(--color-background-secondary);
        border: 1.5px solid var(--color-border-primary);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .follow-num {
        font-size: 24px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .follow-label {
        font-size: 14px;
        color: var(--color-text-secondary);
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border: 1.5px solid var(--color-border-primary);
        border-radius: 16px;
        overflow: hidden;
      }
      .stat-item {
        padding: 22px 16px;
        text-align: center;
        border-right: 1.5px solid var(--color-border-primary);
      }
      .stat-item:last-child {
        border-right: none;
      }
      .stat-icon {
        margin-bottom: 8px;
        color: var(--color-text-secondary);
        display: flex;
        justify-content: center;
      }
      .stat-label {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
      }
      .stat-num {
        font-size: 30px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .contrib-box {
        border: 1.5px solid var(--color-border-primary);
        border-radius: 16px;
        padding: 26px;
      }
      .contrib-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .contrib-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .contrib-count {
        font-size: 16px;
        color: var(--color-text-secondary);
      }
      .legend {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--color-text-secondary);
      }
      .legend-sq {
        width: 14px;
        height: 14px;
        border-radius: 2px;
      }
      .month-labels-wrap {
        position: relative;
        height: 18px;
        margin-left: 42px;
        margin-bottom: 6px;
      }
      .month-label {
        position: absolute;
        font-size: 13px;
        color: var(--color-text-secondary);
      }
      .day-labels {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-right: 6px;
        flex-shrink: 0;
      }
      .day-label {
        font-size: 12px;
        color: var(--color-text-secondary);
        height: 17px;
        display: flex;
        align-items: center;
      }
      .week-col {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .sq {
        width: 17px;
        height: 17px;
        border-radius: 3px;
      }
      .l0 {
        background: var(--color-background-secondary);
      }
      .l1 {
        background: #9be9a8;
      }
      .l2 {
        background: #40c463;
      }
      .l3 {
        background: #30a14e;
      }
      .l4 {
        background: #216e39;
      }
      @media (prefers-color-scheme: dark) {
        .l1 {
          background: #0e4429;
        }
        .l2 {
          background: #006d32;
        }
        .l3 {
          background: #26a641;
        }
        .l4 {
          background: #39d353;
        }
      }
      .contrib-foot {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: var(--color-text-secondary);
      }
    </style>

    <div class="card">
      <div class="left">
        <div class="avatar">
          <img
            src="https://avatars.githubusercontent.com/u/108007761?v=4"
            alt="rlaxogh76"
          />
        </div>
        <div class="name">rlaxogh76</div>
        <div class="handle">rlaxogh76</div>
        <hr class="divider" />
        <div class="meta">
          <div class="follow-row">
            <div class="follow-box">
              <div class="follow-num">318</div>
              <div class="follow-label">팔로윙</div>
            </div>
            <div class="follow-box">
              <div class="follow-num">1,204</div>
              <div class="follow-label">팔로워</div>
            </div>
          </div>
          <div class="meta-row">
            <svg
              class="meta-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <rect x="2" y="3" width="12" height="11" rx="1.5" />
              <line x1="2" y1="7" x2="14" y2="7" />
              <line x1="5" y1="1" x2="5" y2="5" />
              <line x1="11" y1="1" x2="11" y2="5" />
            </svg>
            <span class="label">계정 생성일</span>
            <span class="val">2020-05-20</span>
          </div>
          <div class="meta-row">
            <svg
              class="meta-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <rect x="2" y="2" width="12" height="12" rx="1.5" />
              <line x1="5" y1="6" x2="11" y2="6" />
              <line x1="5" y1="9" x2="9" y2="9" />
            </svg>
            <span class="label">레포지토리</span>
            <span class="val">42</span>
          </div>
          <div class="meta-row">
            <svg
              class="meta-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <polygon
                points="8,2 10,6 14,6.5 11,9.5 11.8,14 8,11.8 4.2,14 5,9.5 2,6.5 6,6"
              />
            </svg>
            <span class="label">받은 별</span>
            <span class="val">1,234</span>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <circle cx="6" cy="4" r="2" />
                <circle cx="14" cy="4" r="2" />
                <circle cx="10" cy="16" r="2" />
                <path d="M6 6v4M14 6v4M6 10h8M10 10v4" />
              </svg>
            </div>
            <div class="stat-label">커밋</div>
            <div class="stat-num">1,234</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <path d="M10 3v10M6 9l4 4 4-4" />
                <line x1="4" y1="17" x2="16" y2="17" />
              </svg>
            </div>
            <div class="stat-label">푸시</div>
            <div class="stat-num">567</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <circle cx="10" cy="10" r="7" />
                <line x1="10" y1="7" x2="10" y2="11" />
                <circle cx="10" cy="13.5" r="0.8" fill="currentColor" />
              </svg>
            </div>
            <div class="stat-label">이슈 생성</div>
            <div class="stat-num">89</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <rect x="3" y="4" width="14" height="11" rx="2" />
                <line x1="7" y1="8" x2="13" y2="8" />
                <line x1="7" y1="11" x2="11" y2="11" />
              </svg>
            </div>
            <div class="stat-label">코드 리뷰 생성</div>
            <div class="stat-num">123</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg
                width="28"
                height="28"
                viewBox="0 0 20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <circle cx="7" cy="8" r="3" />
                <circle cx="13" cy="8" r="3" />
                <path d="M1 17c0-3 2.7-5 6-5M13 12c3.3 0 6 2 6 5" />
              </svg>
            </div>
            <div class="stat-label">총 기여도</div>
            <div class="stat-num">2,013</div>
          </div>
        </div>

        <div class="contrib-box">
          <div class="contrib-header">
            <span class="contrib-title">전체 기여도</span>
            <span class="contrib-count">2,013 contributions</span>
            <div class="legend">
              <span>Less</span>
              <div
                class="legend-sq"
                style="background: var(--color-background-secondary)"
              ></div>
              <div class="legend-sq l1"></div>
              <div class="legend-sq l2"></div>
              <div class="legend-sq l3"></div>
              <div class="legend-sq l4"></div>
              <span>More</span>
            </div>
          </div>
          <div style="overflow-x: auto">
            <div class="month-labels-wrap" id="month-labels"></div>
            <div style="display: flex">
              <div class="day-labels">
                <div class="day-label" style="visibility: hidden">S</div>
                <div class="day-label">Mon</div>
                <div class="day-label" style="visibility: hidden">T</div>
                <div class="day-label">Wed</div>
                <div class="day-label" style="visibility: hidden">T</div>
                <div class="day-label">Fri</div>
                <div class="day-label" style="visibility: hidden">S</div>
              </div>
              <div style="display: flex; gap: 3px" id="graph"></div>
            </div>
          </div>
          <div class="contrib-foot">Learn how we count contributions</div>
        </div>
      </div>
    </div>

    <script>
      const graph = document.getElementById("graph");
      const mlWrap = document.getElementById("month-labels");
      const months = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];
      const SQ = 17,
        GAP = 3,
        STEP = SQ + GAP;
      const weeks = 53;
      const startDate = new Date(2024, 0, 1);
      let monthFirst = {};
      for (let w = 0; w < weeks; w++) {
        const col = document.createElement("div");
        col.className = "week-col";
        for (let d = 0; d < 7; d++) {
          const sq = document.createElement("div");
          const r = Math.random();
          const l =
            r < 0.35 ? 0 : r < 0.55 ? 1 : r < 0.72 ? 2 : r < 0.87 ? 3 : 4;
          sq.className = "sq l" + l;
          col.appendChild(sq);
          const date = new Date(startDate);
          date.setDate(date.getDate() + w * 7 + d);
          const m = date.getMonth();
          if (monthFirst[m] === undefined) monthFirst[m] = w;
        }
        graph.appendChild(col);
      }
      months.forEach((m, i) => {
        if (monthFirst[i] !== undefined) {
          const lbl = document.createElement("div");
          lbl.className = "month-label";
          lbl.style.left = monthFirst[i] * STEP + "px";
          lbl.textContent = m;
          mlWrap.appendChild(lbl);
        }
      });
    </script>
  </body>
</html>
